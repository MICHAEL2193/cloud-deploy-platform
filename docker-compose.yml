services:
  app:
    build:
      context: ./app
    container_name: cloud-app
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: public.ecr.aws/docker/library/nginx:stable-alpine
    container_name: cloud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/cloud-deploy-platform.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
